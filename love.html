<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Sathiya · forever</title>
  <!-- Bootstrap minimal (only for icons & layout) + premium fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Elegant serif & sans-serif pairing -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #f7f0f3;  /* soft neutral base */
      background-image: radial-gradient(circle at 10% 30%, #f9eef3 0%, #f3e4eb 100%);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* main card — subtle elegance, no excess */
    .love-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px 24px 48px 24px;
      box-shadow: 0 40px 60px -30px rgba(120, 60, 80, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.9) inset;
      max-width: 420px;
      width: 100%;
      padding: 32px 24px 36px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      text-align: center;
      transition: all 0.3s ease;
    }

    /* name — refined serif with subtle gradient */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4.4rem;
      font-weight: 700;
      background: linear-gradient(145deg, #9e6b7e, #b27c92);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-shadow: 2px 2px 10px rgba(190, 130, 150, 0.2);
    }

    /* small decorative line */
    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #cfa5b9, transparent);
      margin: 8px auto 16px;
    }

    /* GIF container — elegant frame */
    .gif-frame {
      width: 200px;
      height: 200px;
      margin: 12px auto 18px;
      border-radius: 40% 20% 40% 20%;
      background: #f2dfe8;
      padding: 8px;
      box-shadow: 0 25px 35px -15px rgba(140, 80, 100, 0.4), 0 0 0 4px white, 0 0 0 5px #f0d5e2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Replace the src with your GIF file */
    .gif-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 40% 20% 40% 20%;
      display: block;
    }

    /* fallback icon (elegant) — remove when you add your GIF */
    .gif-frame i {
      font-size: 6rem;
      color: #b3869b;
      opacity: 0.8;
    }

    .gif-caption {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 1.5px;
      color: #8b6f7c;
      text-transform: uppercase;
      margin-top: 4px;
      margin-bottom: 20px;
    }

    /* message area — clean & airy */
    .declaration {
      background: rgba(255, 255, 255, 0.6);
      border-radius: 48px 24px 48px 24px;
      padding: 28px 20px;
      margin: 18px 0 24px;
      border: 2px solid white;
      box-shadow: 0 15px 25px -15px rgba(140, 80, 100, 0.2);
    }

    .love-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.2rem;
      font-weight: 600;
      color: #8e5a72;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .love-message {
      font-size: 1.2rem;
      font-weight: 300;
      color: #4f3843;
      margin: 12px 0;
      line-height: 1.6;
    }

    .love-message span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 500;
      color: #a55a7a;
      display: block;
      margin-top: 8px;
    }

    /* hearts — minimal & graceful */
    .hearts-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 16px 0 10px;
      font-size: 2rem;
      color: #c994ae;
      animation: gentleWave 3s infinite alternate ease-in-out;
    }

    @keyframes gentleWave {
      0% { transform: translateY(0); }
      100% { transform: translateY(-5px); }
    }

    /* infinity badge — understated */
    .infinity-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid white;
      padding: 10px 28px;
      border-radius: 60px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: #825066;
      box-shadow: 0 5px 15px rgba(190, 130, 150, 0.2);
      backdrop-filter: blur(5px);
      margin: 8px 0 4px;
    }

    .infinity-badge i {
      font-size: 1.4rem;
      margin: 0 6px;
      color: #b27c92;
    }

    /* back link — refined */
    .back-link {
      margin-top: 24px;
      font-size: 1rem;
      font-weight: 400;
    }

    .back-link a {
      color: #9b7185;
      text-decoration: none;
      border-bottom: 1px dotted #dbb6c9;
      padding-bottom: 2px;
      transition: 0.2s;
    }

    .back-link a:hover {
      color: #b27c92;
      border-bottom: 1px solid #b27c92;
    }

    /* no sparkles, no overload — pure elegance */
  </style>
</head>
<body>
  <div class="love-card">
    <!-- name with quiet elegance -->
    <div class="name">Sathiya</div>
    <div class="divider"></div>

    <!-- ===== YOUR GIF GOES HERE ===== -->
    <!-- Replace the <i> tag with an <img> tag pointing to your GIF file -->
    <div class="gif-frame">
      <img src="images/kiss.gif" alt="Sathiya and you">
    </div>
    <div class="gif-caption">a moment to hold</div>

    <!-- main declaration -->
    <div class="declaration">
      <div class="love-title">you said yes</div>
      <div class="love-message">
        and everything changed<br>
        <span>for the better</span>
      </div>

      <!-- gentle hearts -->
      <div class="hearts-row">
        <i class="bi bi-heart"></i>
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart"></i>
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart"></i>
      </div>

      <div class="love-message" style="font-size:1.1rem; margin-top:16px;">
        i love you, endlessly.
      </div>
    </div>

    <!-- simonuint badge — quiet & elegant -->
    <div class="infinity-badge">
      <i class="bi bi-infinity"></i> simonuint <i class="bi bi-infinity"></i>
    </div>

    <!-- subtle restart link -->
    <div class="back-link">
      <a href="index.html"><i class="bi bi-arrow-return-left"></i> return to beginning</a>
    </div>
  </div>
</body>
</html>
