<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>💖 sathiya · will you? (mobile magic) 💖</title>
  <!-- Bootstrap 5 + icons + jQuery + romantic fonts (mobile first) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google fonts: elegance even on small screens -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Parisienne&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;500;900&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    /* mobile first — everything scaled for small screen, max cuteness */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #ffd9e6, #fbc2d0 60%, #f9b1c7);
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 6px;
      position: relative;
      overflow-x: hidden;
    }

    /* 🌟 mobile sparkle background (lighter, but still plenty) */
    .sparkle-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .sparkle-bg i {
      position: absolute;
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.2rem;
      animation: sparkleFloat 8s infinite ease-in-out;
      text-shadow: 0 0 10px #ffb0c3, 0 0 30px #ffd0df;
    }
    @keyframes sparkleFloat {
      0% { transform: translateY(110vh) rotate(0deg) scale(0.3); opacity: 0; }
      20% { opacity: 0.9; transform: scale(1.1) rotate(10deg); }
      100% { transform: translateY(-20vh) rotate(360deg) scale(0.6); opacity: 0; }
    }

    /* main card — compact yet fully glassy */
    .proposal-card {
      background: rgba(255, 245, 250, 0.25);
      backdrop-filter: blur(15px) saturate(180%);
      -webkit-backdrop-filter: blur(15px) saturate(180%);
      border-radius: 3.5rem 2rem 3.5rem 2rem;
      box-shadow: 0 30px 50px rgba(170, 60, 110, 0.5), 0 0 0 5px rgba(255, 255, 255, 0.8), 0 0 40px #ffb7cf;
      max-width: 420px;  /* perfect for mobile */
      width: 100%;
      padding: 1.8rem 1.2rem 2.2rem;
      border: 2px solid rgba(255, 240, 250, 0.9);
      z-index: 20;
      position: relative;
      margin: 0 auto;
    }

    /* name treatment — responsive font size */
    .sw-name {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3.2rem, 15vw, 4.6rem);
      background: linear-gradient(145deg, #b82354, #e8436e, #ff99bb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 25px #ffb0c3, 0 0 50px white;
      filter: drop-shadow(0 5px 5px #faaac0);
      line-height: 1.1;
      margin-bottom: -5px;
    }

    .sub-name {
      font-family: 'Parisienne', cursive;
      font-size: clamp(1.2rem, 6vw, 1.9rem);
      color: #fef2f7;
      text-shadow: 0 0 18px #ff3070, 0 1px 8px #b63e5e;
      background: rgba(220, 70, 120, 0.3);
      display: inline-block;
      padding: 0.2rem 1.8rem;
      border-radius: 60px;
      backdrop-filter: blur(10px);
      margin-top: -8px;
      border: 1px solid white;
    }

    /* photo halo — smaller but still glowing */
    .photo-glow {
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      margin: 0.8rem auto 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 5px solid white;
      box-shadow: 0 0 40px #ff88b0, 0 15px 30px #e06f93;
      backdrop-filter: blur(4px);
    }
    .photo-glow i {
      font-size: 4.5rem;
      color: #cf3f6e;
      filter: drop-shadow(0 0 10px crimson);
    }

    /* big question — mobile adjusted */
    .big-question {
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 800;
      color: #2f1722;
      background: rgba(255, 255, 255, 0.55);
      padding: 0.8rem 0.4rem;
      border-radius: 60px;
      backdrop-filter: blur(12px);
      margin-bottom: 1.5rem;
      box-shadow: inset 0 -2px 0 #fec7db, 0 8px 25px #ffb7cd;
      font-family: 'Playfair Display', serif;
    }
    .big-question span {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.4rem, 10vw, 3.6rem);
      color: #b11f51;
    }

    /* BUTTONS — fat & tappable on mobile */
    .btn-group-deluxe {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .yes-btn {
      background: linear-gradient(145deg, #e8436e, #c72e60);
      border: none;
      padding: 16px 30px;
      font-size: 2.2rem;
      font-weight: 800;
      border-radius: 70px;
      box-shadow: 0 8px 0 #831f42, 0 18px 35px #f28aa8, 0 0 25px #ffacc7;
      color: white;
      transition: 0.1s ease;
      border: 3px solid #ffeef4;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex: 0 1 auto;
      min-width: 160px;
    }
    .yes-btn:hover {
      background: linear-gradient(145deg, #f36289, #e33e72);
      transform: translateY(-4px);
      box-shadow: 0 12px 0 #831f42, 0 25px 45px #ff9ebe, 0 0 40px #ffe0ed;
    }
    .yes-btn:active {
      transform: translateY(6px);
      box-shadow: 0 5px 0 #831f42, 0 18px 35px #f28aa8;
    }

    .no-btn {
      background: linear-gradient(145deg, #7f7f99, #6a6a83);
      border: none;
      padding: 16px 24px;
      font-size: 2.2rem;
      font-weight: 800;
      border-radius: 70px;
      box-shadow: 0 8px 0 #414155, 0 18px 35px #afafc5;
      color: #fdf2f7;
      transition: 0.1s ease;
      border: 3px solid #fafafa;
      cursor: pointer;
      min-width: 130px;
    }
    .no-btn.move-no {
      transition: transform 0.2s cubic-bezier(0.3, 1.2, 0.6, 1), box-shadow 0.2s;
    }
    .no-btn:hover:not(.disabled-no) {
      transform: scale(1.03) translate(12px, -12px) rotate(1deg) !important;
      box-shadow: 0 14px 0 #414155, 0 30px 45px #b4b4d0;
      background: #9595b0;
    }

    /* ✨ YES MESSAGE — compact but still luxurious, never disappears */
    .forever-message {
      background: rgba(255, 240, 250, 0.95);
      backdrop-filter: blur(18px);
      border: 4px ridge rgba(255, 150, 200, 0.9);
      border-radius: 50px 30px 30px 50px;
      padding: 1.8rem 1rem;
      margin: 20px 0 5px;
      box-shadow: 0 0 60px #ffa3c0, 0 20px 40px #f28eb0, inset 0 0 30px #fff0f7;
      animation: glowPulse 1.8s infinite alternate;
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 30px #ff80aa, 0 0 0 4px #fec7db, 0 20px 35px #f0628c; }
      100% { box-shadow: 0 0 70px #ffb7d0, 0 0 0 8px #ffe5f0, 0 25px 55px #ff8eb0; }
    }

    .simon-badge {
      font-size: clamp(3.5rem, 15vw, 5.5rem);
      font-family: 'Great Vibes', cursive;
      background: linear-gradient(135deg, #ba265b, #ff6f9d, #ffcdd9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 900;
      text-shadow: 0 0 40px #ffffff, 0 0 80px #ffc1d0;
      letter-spacing: 2px;
      line-height: 1.2;
    }

    .simon-sub {
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-family: 'Parisienne', cursive;
      color: #a13059;
      text-shadow: 0 0 30px #ffbfdc;
    }

    .floating-hearts-xl i {
      font-size: 2.8rem;
      margin: 0 8px;
      color: #f84c78;
      filter: drop-shadow(0 0 20px #ff90b5);
      display: inline-block;
      animation: floatLove 1.5s infinite alternate;
    }
    @keyframes floatLove {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-15px) scale(1.3); }
    }

    .extra-glitter span {
      display: inline-block;
      font-size: 1.8rem;
      animation: glitter 2s infinite;
    }

    @keyframes glitter {
      0% { opacity: 0.4; text-shadow: 0 0 5px gold; }
      50% { opacity: 1; text-shadow: 0 0 30px #ffd700, 0 0 50px hotpink; transform: scale(1.2); }
      100% { opacity: 0.5; text-shadow: 0 0 5px gold; }
    }

    /* footer hint — mobile smaller */
    .reset-romantic {
      color: #f8cfdf;
      font-size: 1.1rem;
      background: rgba(0, 0, 0, 0.1);
      padding: 0.5rem 0.8rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      margin-top: 15px;
    }

    /* mobile badge adjust */
    .badge.fs-6 {
      font-size: 1.1rem !important;
      padding: 0.6rem 1.4rem !important;
    }
  </style>
</head>
<body>
  <!-- sparkles for mobile (fewer but still magical) -->
  <div class="sparkle-bg" id="sparkleBg"></div>

  <div class="proposal-card">
    <!-- top badge responsive -->
    <div class="d-flex justify-content-center mb-2">
      <span class="badge bg-white px-4 py-2 rounded-pill shadow" style="font-size:1.2rem; color:#bc3361;"><i class="bi bi-gem me-1 text-danger"></i>sathiya's magic<i class="bi bi-gem ms-1 text-danger"></i></span>
    </div>

    <!-- main name mobile sized -->
    <div class="sw-name">
      Sathiya
    </div>
    <div class="sub-name mx-auto">
      <i class="bi bi-flower2"></i> my forever <i class="bi bi-flower2"></i>
    </div>

    <!-- photo frame -->
    <div class="photo-glow">
      <i class="bi bi-stars"></i>
    </div>

    <!-- big question mobile friendly -->
    <div class="big-question">
      <span> Sathiya, </span> <br>
      will you be mine?
    </div>

    <!-- BUTTONS (big & tappable) -->
    <div class="btn-group-deluxe">
      <button class="yes-btn" id="yesBtn"><i class="bi bi-suit-heart-fill me-2"></i>YES</button>
      <button class="no-btn" id="noBtn"><i class="bi bi-emoji-frown me-2"></i>no</button>
    </div>

    <!-- THE ETERNAL YES MESSAGE – STICKS FOREVER -->
    <div id="simonMessage" style="display: none;" class="forever-message">
      <div class="simon-badge">
        💖 simonuint 💖
      </div>
      <div class="simon-sub">
        sathiya said YES!
      </div>
      <!-- hearts for mobile (slightly fewer but bigger) -->
      <div class="floating-hearts-xl my-3">
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart-fill"></i>
      </div>
      <div class="extra-glitter mb-2">
        <span>✨</span><span>💎</span><span>✨</span><span>💫</span><span>🌟</span>
      </div>
      <p class="display-6 fw-bold" style="color:#b32d60; text-shadow: 0 0 40px white;">I LOVE YOU</p>
      <p class="fs-4" style="color:#ff7ba3;"><i class="bi bi-envelope-paper-heart"></i> you're my everything <i class="bi bi-envelope-paper-heart"></i></p>
      <div class="mt-3">
        <span class="badge bg-dark text-white rounded-pill p-3 fs-5" style="background: linear-gradient(45deg, #db3f73, #f26494); border: 2px solid white;">💞 simonuint forever 💞</span>
      </div>
    </div>

    <!-- reset hint (always romantic) -->
    <div class="reset-romantic" id="resetHint">
      <i class="bi bi-infinity"></i> refresh & fall again <i class="bi bi-infinity"></i>
    </div>
  </div>

  <!-- jQuery for mobile + mischievous no button + persistent yes message -->
  <script>
    $(document).ready(function(){

      // ========== mobile background sparkles ==========
      for (let s=0; s<45; s++) {   // enough for mobile, not too heavy
        let left = Math.random() * 100;
        let delay = Math.random() * 12;
        let spark = $('<i class="bi bi-star-fill"></i>').css({
          left: left + '%',
          fontSize: (0.8 + Math.random() * 2.2) + 'rem',
          animationDelay: delay + 's',
          opacity: 0.3 + Math.random() * 0.6,
          color: Math.random() > 0.3 ? '#ffe5f0' : '#ffd966'
        });
        $('#sparkleBg').append(spark);
      }
      for (let h=0; h<18; h++) {
        let left = Math.random() * 100;
        let delay = Math.random() * 15;
        let heart = $('<i class="bi bi-suit-heart-fill"></i>').css({
          left: left + '%',
          fontSize: (1 + Math.random() * 2) + 'rem',
          animationDelay: delay + 's',
          opacity: 0.15,
          color: '#ffb0c9'
        });
        $('#sparkleBg').append(heart);
      }

      // ---------- YES / NO logic (mobile adjusted) ----------
      let noClickedCount = 0;
      const $noBtn = $('#noBtn');
      const $yesBtn = $('#yesBtn');
      const $simonMsg = $('#simonMessage');
      const $questionDiv = $('.big-question');
      const $resetHint = $('#resetHint');
      const $card = $('.proposal-card');

      // YES button — shows message and NEVER hides it + extra sparkle
      $yesBtn.on('click', function(){
        if ($simonMsg.is(':visible')) {
          // if already visible, just add more glitter (optional)
          $simonMsg.append('<span class="extra-sparkle">💖</span>');
          return;
        }
        // show forever
        $simonMsg.fadeIn(600).css('display', 'block');
        // change question text
        $questionDiv.html(`<span style="font-family: 'Great Vibes';font-size:3.2rem;">yess! 💖</span> <br> she loves me!`);
        // disable yes (but keep visible)
        $yesBtn.prop('disabled', true).css('opacity','0.9').html('<i class="bi bi-check2-circle"></i> YES 💘');
        // hide no button (no escape needed)
        $noBtn.fadeOut(400);
        // update footer
        $resetHint.html('<i class="bi bi-balloon-heart"></i> Sathiya chose love! <i class="bi bi-balloon-heart"></i>');
        
        // mobile-friendly confetti simulation (just a few sparkles)
        for (let f=0; f<10; f++) {
          setTimeout(() => {
            $('body').append('<div style="position:fixed; top:'+(20+Math.random()*60)+'%; left:'+(10+Math.random()*80)+'%; font-size:40px; color:#ffb0d0; z-index:9999; pointer-events:none; filter:drop-shadow(0 0 8px gold);">🎉✨</div>').fadeOut(1000);
          }, f*60);
        }
        // extra pulse
        $card.css('animation', 'glowPulse 1.8s infinite alternate');
      });

      // mischievous NO — moves away, no action on click (pure evasion)
      $noBtn.on('mouseenter', function(e){
        if ($simonMsg.is(':visible')) return; // already yes, no hidden anyway

        let btn = $(this);
        let card = $card;
        let cardW = card.outerWidth();
        let cardH = card.outerHeight();
        let btnW = btn.outerWidth();
        let btnH = btn.outerHeight();

        // get current relative position
        let currLeft = btn.position().left;
        let currTop = btn.position().top;

        // random offset inside card (mobile friendly)
        let newLeft = currLeft + (Math.random() * 200 - 100);
        let newTop = currTop + (Math.random() * 180 - 90);

        // clamp inside card (with padding)
        newLeft = Math.min(cardW - btnW - 15, Math.max(15, newLeft));
        newTop = Math.min(cardH - btnH - 15, Math.max(15, newTop));

        card.css('position', 'relative');
        btn.addClass('move-no').css({
          'position': 'absolute',
          'left': newLeft + 'px',
          'top': newTop + 'px',
          'zIndex': 999
        });

        noClickedCount++;
        // playful text changes
        if (noClickedCount === 1) btn.html('😢 sure?');
        else if (noClickedCount === 2) btn.html('🥺 please?');
        else if (noClickedCount === 3) btn.html('think again');
        else if (noClickedCount === 4) btn.html('💔 click yes');
        else if (noClickedCount >= 5) btn.html('❤️ yes?');
        
      });

      // NO click does NOTHING (literally no action, just evade)
      $noBtn.on('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        if ($simonMsg.is(':visible')) return;
        $(this).trigger('mouseenter');  // move again
      });

      // small mobile-friendly tease
      setTimeout(() => {
        if (!$simonMsg.is(':visible')) {
          $noBtn.css('transform', 'translate(8px, -6px)');
          setTimeout(() => $noBtn.css('transform', ''), 300);
        }
      }, 900);
    });
  </script>

  <!-- extra mobile animations -->
  <style>
    .sw-name {
      animation: shine 4s infinite;
    }
    @keyframes shine {
      0% { filter: drop-shadow(0 0 10px #ff8ab0); }
      50% { filter: drop-shadow(0 0 30px #ffd0df) drop-shadow(0 0 60px white); }
    }
    .photo-glow {
      animation: photopulse 3s infinite alternate;
    }
    @keyframes photopulse {
      from { box-shadow: 0 0 25px #ffb7c5, 0 0 0 0 #ffe2f0; }
      to { box-shadow: 0 0 60px #ffb0d0, 0 0 0 12px #ffffff80; }
    }
    /* touch-friendly button active state */
    .yes-btn:active, .no-btn:active {
      transition: transform 0.05s;
    }
  </style>
</body>
</html>
