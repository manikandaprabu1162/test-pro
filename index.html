<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ for sathiya — the only yes that matters ✨</title>
  <!-- Bootstrap 5 + icons + jQuery + ultra romantic fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts: extra fancy + elegance -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Parisienne&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;500;900&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 30%, #ffdde1, #fbc2d5 40%, #f9b8c9 80%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.8rem;
      position: relative;
      overflow-x: hidden;
    }

    /* 🌟 GLITTER SPARKLES BACKGROUND (MORE MORE MORE) */
    .sparkle-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .sparkle-bg i {
      position: absolute;
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.4rem;
      animation: sparkleFloat 7s infinite ease-in-out;
      text-shadow: 0 0 15px #ffa5c3, 0 0 30px #ffd9e5;
    }
    @keyframes sparkleFloat {
      0% { transform: translateY(110vh) rotate(0deg) scale(0.3); opacity: 0; }
      20% { opacity: 1; transform: scale(1.2) rotate(15deg); }
      100% { transform: translateY(-20vh) rotate(360deg) scale(0.8); opacity: 0; }
    }

    /* main card — GLASSMORPHISM + GOLD + SPARKLE */
    .proposal-card {
      background: rgba(255, 245, 250, 0.2);
      backdrop-filter: blur(15px) saturate(180%);
      -webkit-backdrop-filter: blur(15px) saturate(180%);
      border-radius: 5rem 3rem 5rem 3rem;
      box-shadow: 0 40px 70px rgba(190, 60, 120, 0.5), 0 0 0 6px rgba(255, 255, 255, 0.75), 0 0 50px #ffbfd7;
      max-width: 900px;
      width: 100%;
      padding: 3rem 2.5rem 3.5rem;
      border: 2px solid rgba(255, 240, 245, 0.9);
      transition: 0.3s;
      z-index: 20;
      position: relative;
    }

    /* name treatment — pure elegance */
    .sw-name {
      font-family: 'Great Vibes', cursive;
      font-size: 5.5rem;
      background: linear-gradient(145deg, #b32e5a, #e8436e, #ff8eb5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px #ffb7c5, 0 0 60px #ffffff;
      filter: drop-shadow(0 10px 6px #fcaac0);
      letter-spacing: 2px;
      line-height: 1.2;
      margin-bottom: -5px;
    }

    .sub-name {
      font-family: 'Parisienne', cursive;
      font-size: 2.4rem;
      color: #fef2f7;
      text-shadow: 0 0 25px #ff2e6a, 0 2px 10px #b63e5e;
      background: rgba(230, 80, 130, 0.3);
      display: inline-block;
      padding: 0.3rem 3rem;
      border-radius: 100px;
      backdrop-filter: blur(10px);
      margin-top: -15px;
      border: 1px solid white;
    }

    /* photo halo */
    .photo-glow {
      width: 160px;
      height: 160px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      margin: 1.2rem auto 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 6px solid white;
      box-shadow: 0 0 50px #ff94b6, 0 20px 40px #e06f93;
      backdrop-filter: blur(4px);
    }
    .photo-glow i {
      font-size: 6rem;
      color: #cf3f6e;
      filter: drop-shadow(0 0 12px crimson);
    }

    /* big question — extravagant */
    .big-question {
      font-size: 3.2rem;
      font-weight: 900;
      color: #3f202e;
      background: rgba(255, 255, 255, 0.6);
      padding: 0.9rem 0.5rem;
      border-radius: 80px;
      backdrop-filter: blur(10px);
      margin-bottom: 2rem;
      box-shadow: inset 0 -3px 0 #fec7db, 0 10px 30px #ffbfd2;
      font-family: 'Playfair Display', serif;
    }
    .big-question span {
      font-family: 'Great Vibes', cursive;
      font-size: 4rem;
      color: #b11f51;
    }

    /* BUTTONS — LUXURY EDITION */
    .btn-group-deluxe {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .yes-btn {
      background: linear-gradient(145deg, #e8436e, #c72e60);
      border: none;
      padding: 18px 55px;
      font-size: 2.6rem;
      font-weight: 800;
      border-radius: 80px;
      box-shadow: 0 12px 0 #831f42, 0 20px 40px #f28aa8, 0 0 30px #ffacc7;
      color: white;
      transition: 0.1s ease;
      border: 3px solid #ffeef4;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .yes-btn:hover {
      background: linear-gradient(145deg, #f36289, #e33e72);
      transform: translateY(-5px);
      box-shadow: 0 15px 0 #831f42, 0 30px 50px #ff9ebe, 0 0 50px #ffe0ed;
      color: #fff9fb;
    }
    .yes-btn:active {
      transform: translateY(8px);
      box-shadow: 0 8px 0 #831f42, 0 20px 40px #f28aa8;
    }

    .no-btn {
      background: linear-gradient(145deg, #7f7f99, #6a6a83);
      border: none;
      padding: 18px 40px;
      font-size: 2.6rem;
      font-weight: 800;
      border-radius: 80px;
      box-shadow: 0 12px 0 #414155, 0 20px 40px #afafc5;
      color: #fdf2f7;
      transition: 0.1s ease;
      border: 3px solid #fafafa;
      cursor: pointer;
      position: relative;
    }
    .no-btn.move-no {
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
    }
    .no-btn:hover:not(.disabled-no) {
      transform: scale(1.05) translate(20px, -15px) rotate(2deg) !important;
      box-shadow: 0 18px 0 #414155, 0 35px 50px #b4b4d0;
      background: #9595b0;
    }

    /* ✨✨ YES MESSAGE — STICKY, NEVER DISAPPEAR, MAXIMUM STYLE ✨✨ */
    .forever-message {
      background: rgba(255, 240, 250, 0.9);
      backdrop-filter: blur(18px);
      border: 4mm ridge rgba(255, 150, 200, 0.8);
      border-radius: 80px 80px 30px 80px;
      padding: 2.8rem 2rem;
      margin: 30px 0 15px;
      box-shadow: 0 0 80px #ffa3c0, 0 30px 60px #f28eb0, inset 0 0 40px #fff0f7;
      animation: glowPulse 2s infinite alternate;
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 40px #ff80aa, 0 0 0 4px #fec7db, 0 30px 50px #f0628c; }
      100% { box-shadow: 0 0 90px #ffb7d0, 0 0 0 12px #ffe5f0, 0 35px 70px #ff8eb0; }
    }

    .simon-badge {
      font-size: 7rem;
      font-family: 'Great Vibes', cursive;
      background: linear-gradient(135deg, #ba265b, #ff6f9d, #ffcdd9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 900;
      text-shadow: 0 0 60px #ffffff, 0 0 120px #ffc1d0;
      letter-spacing: 5px;
      line-height: 1.2;
    }

    .simon-sub {
      font-size: 3.5rem;
      font-family: 'Parisienne', cursive;
      color: #a13059;
      text-shadow: 0 0 30px #ffbfdc;
    }

    .floating-hearts-xl i {
      font-size: 4rem;
      margin: 0 15px;
      color: #f84c78;
      filter: drop-shadow(0 0 25px #ff90b5);
      display: inline-block;
      animation: floatLove 1.5s infinite alternate;
    }
    @keyframes floatLove {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-25px) scale(1.4); }
    }

    .extra-glitter span {
      display: inline-block;
      font-size: 2.2rem;
      animation: glitter 2s infinite;
    }

    @keyframes glitter {
      0% { opacity: 0.3; text-shadow: 0 0 5px gold; }
      50% { opacity: 1; text-shadow: 0 0 40px #ffd700, 0 0 70px hotpink; transform: scale(1.2); }
      100% { opacity: 0.4; text-shadow: 0 0 5px gold; }
    }

    /* footer hint but extra stylish */
    .reset-romantic {
      color: #ebc2d2;
      font-size: 1.5rem;
      font-weight: 300;
      background: rgba(0, 0, 0, 0.1);
      padding: 0.8rem;
      border-radius: 100px;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <!-- more sparkles than ever -->
  <div class="sparkle-bg" id="sparkleBg"></div>

  <div class="proposal-card">
    <!-- badge like a queen -->
    <div class="d-flex justify-content-center mb-3">
      <span class="badge bg-white px-5 py-3 rounded-pill shadow-lg" style="font-size:1.8rem; color:#bc3361;"><i class="bi bi-gem me-2 text-danger"></i>for the one & only SATHIYA<i class="bi bi-gem ms-2 text-danger"></i></span>
    </div>

    <!-- main name in ultra bling -->
    <div class="sw-name">
      Sathiya
    </div>
    <div class="sub-name mx-auto">
      <i class="bi bi-flower2"></i> my starlight <i class="bi bi-flower2"></i>
    </div>

    <!-- picture frame with extra shine -->
    <div class="photo-glow">
      <i class="bi bi-stars"></i>
    </div>

    <!-- big question (extra large) -->
    <div class="big-question">
      <span> Sathiya, </span> <br>
      will you be mine forever?
    </div>

    <!-- BUTTON ZONE -->
    <div class="btn-group-deluxe">
      <button class="yes-btn" id="yesBtn"><i class="bi bi-suit-heart-fill me-3"></i>YES</button>
      <button class="no-btn" id="noBtn"><i class="bi bi-emoji-frown me-2"></i>no</button>
    </div>

    <!-- THE YES MESSAGE – SHOWS ONCE AND NEVER DISAPPEARS, MORE BLING THAN IMAGINABLE -->
    <div id="simonMessage" style="display: none;" class="forever-message">
      <div class="simon-badge">
        💖 simonuint 💖
      </div>
      <div class="simon-sub">
        sathiya said YES!
      </div>
      <!-- tons of hearts and sparkles -->
      <div class="floating-hearts-xl my-4">
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart-fill"></i>
        <i class="bi bi-heart-fill"></i>
      </div>
      <div class="extra-glitter mb-3">
        <span>✨</span><span>💎</span><span>✨</span><span>💫</span><span>🌟</span><span>✨</span><span>💖</span>
      </div>
      <p class="display-4 fw-bold" style="color:#b32d60; text-shadow: 0 0 60px white;">I LOVE YOU</p>
      <p class="fs-1" style="color:#ff7ba3;"><i class="bi bi-envelope-paper-heart"></i> you're my everything, sathiya <i class="bi bi-envelope-paper-heart"></i></p>
      <div class="mt-4">
        <span class="badge bg-dark text-white rounded-pill p-4 fs-2" style="background: linear-gradient(45deg, #db3f73, #f26494); border: 3px solid white;">💞 simonuint forever 💞</span>
      </div>
    </div>

    <!-- even the reset line is romantic -->
    <div class="reset-romantic mt-4" id="resetHint">
      <i class="bi bi-infinity"></i> this moment is infinite — refresh only to fall in love again <i class="bi bi-infinity"></i>
    </div>
  </div>

  <!-- jQuery magic + more more more effects -->
  <script>
    $(document).ready(function(){

      // ========== BACKGROUND SUPER SPARKLES (tons) ==========
      for (let s=0; s<75; s++) {   // more sparkles
        let left = Math.random() * 100;
        let delay = Math.random() * 12;
        let size = 0.8 + Math.random() * 3.5;
        let spark = $('<i class="bi bi-star-fill"></i>').css({
          left: left + '%',
          fontSize: (0.7 + Math.random() * 2.8) + 'rem',
          animationDelay: delay + 's',
          opacity: 0.4 + Math.random() * 0.6,
          color: Math.random() > 0.3 ? '#ffe5f0' : '#ffe06b'
        });
        $('#sparkleBg').append(spark);
      }
      // also add hearts in background
      for (let h=0; h<30; h++) {
        let left = Math.random() * 100;
        let delay = Math.random() * 15;
        let heart = $('<i class="bi bi-suit-heart-fill"></i>').css({
          left: left + '%',
          fontSize: (1 + Math.random() * 2.5) + 'rem',
          animationDelay: delay + 's',
          opacity: 0.2,
          color: '#ffb0c9'
        });
        $('#sparkleBg').append(heart);
      }

      // ---------- YES / NO logic ----------
      let noClickedCount = 0;
      const $noBtn = $('#noBtn');
      const $yesBtn = $('#yesBtn');
      const $simonMsg = $('#simonMessage');
      const $questionDiv = $('.big-question');
      const $resetHint = $('#resetHint');
      const $btnGroup = $('.btn-group-deluxe');
      const $card = $('.proposal-card');

      // ensure message never disappears after YES
      // YES BUTTON click: show message and make it stay FOREVER + glitter overload
      $yesBtn.on('click', function(){
        if ($simonMsg.is(':visible')) return; // already shown, but we want more style – we can re-trigger an extra glow
        else {
          $simonMsg.fadeIn(800).css('display', 'block'); // appears and stays
          // change question to celebrate
          $questionDiv.html(`<span style="font-family: 'Great Vibes';font-size:5rem;">yesss! 💖</span> <br> she loves me!`);
          // disable yes button (still visible, but no double message)
          $yesBtn.prop('disabled', true).css('opacity','0.9').html('<i class="bi bi-check2-circle"></i> YES 💘');
          // make no button vanish (no more escape needed)
          $noBtn.fadeOut(400);
          // update reset hint to be extra
          $resetHint.html('<i class="bi bi-balloon-heart"></i> Sathiya chose love — beaming forever! <i class="bi bi-balloon-heart"></i>');
          
          // ADD EVEN MORE BLING: trigger confetti-like sparkles (just visual)
          for (let f=0; f<18; f++) {
            setTimeout(() => {
              $('body').append('<div style="position:fixed; top:'+(10+Math.random()*70)+'%; left:'+(5+Math.random()*90)+'%; font-size:50px; color:#ffb0d0; z-index:9999; pointer-events:none; filter:drop-shadow(0 0 10px gold);">🎉✨💖</div>').fadeOut(1200);
            }, f*70);
          }

          // extra: add pulsing border to card after yes
          $card.css('animation', 'glowPulse 1.5s infinite alternate');
        }
      });

      // mischievous NO button (never lets her click no, but if yes already visible, ignore)
      $noBtn.on('mouseenter', function(e){
        if ($simonMsg.is(':visible')) return; // yes already, no hidden anyway

        let btn = $(this);
        let cardOffset = $card.offset();
        let cardW = $card.outerWidth();
        let cardH = $card.outerHeight();
        let btnW = btn.outerWidth();
        let btnH = btn.outerHeight();

        // get current absolute position within card
        let currLeft = btn.position().left; // relative to card
        let currTop = btn.position().top;

        // generate new relative position (stay inside card)
        let newLeft = currLeft + (Math.random() * 300 - 150);
        let newTop = currTop + (Math.random() * 250 - 120);

        // keep inside card boundaries with padding
        newLeft = Math.min(cardW - btnW - 20, Math.max(20, newLeft));
        newTop = Math.min(cardH - btnH - 20, Math.max(20, newTop));

        // ensure card relative positioning
        $card.css('position', 'relative');
        btn.addClass('move-no').css({
          'position': 'absolute',
          'left': newLeft + 'px',
          'top': newTop + 'px',
          'zIndex': 999
        });

        noClickedCount++;
        // play with button text
        if (noClickedCount === 1) btn.html('😢 try again');
        else if (noClickedCount === 2) btn.html('🥺 maybe?');
        else if (noClickedCount === 3) btn.html('i am shy');
        else if (noClickedCount === 4) btn.html('💔 no chance');
        else if (noClickedCount >= 5) btn.html('❤️‍🔥 yes?');
      });

      // no button click does nothing (prevents default, but we also show an alert? user wants no action = literally nothing. We'll just move and do nothing.)
      $noBtn.on('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        if ($simonMsg.is(':visible')) return;
        // absolutely nothing — not even alert (remove alert to respect "do nothing")
        // just move again
        $(this).trigger('mouseenter');
      });

      // Initial minor tease
      setTimeout(() => {
        if (!$simonMsg.is(':visible')) {
          $noBtn.css('transform', 'translate(10px, -8px)');
          setTimeout(() => $noBtn.css('transform', ''), 300);
        }
      }, 800);
    });
  </script>

  <!-- ensure the yes message stays after click, extra styles for infinite sparkle -->
  <style>
    /* more animations */
    .forever-message {
      transition: all 0.5s;
    }
    .big-question span {
      animation: softGlow 3s infinite;
    }
    @keyframes softGlow {
      0% { text-shadow: 0 0 10px #fcc; }
      50% { text-shadow: 0 0 40px #ffa5c3, 0 0 80px #ffeff5; }
    }
    .sw-name {
      animation: shine 4s infinite;
    }
    @keyframes shine {
      0% { filter: drop-shadow(0 0 10px #ff8ab0); }
      50% { filter: drop-shadow(0 0 40px #ffd0df) drop-shadow(0 0 100px white); }
    }
    /* more sparkle to photo */
    .photo-glow {
      animation: photopulse 3s infinite alternate;
    }
    @keyframes photopulse {
      from { box-shadow: 0 0 30px #ffb7c5, 0 0 0 0 #ffe2f0; }
      to { box-shadow: 0 0 90px #ffb0d0, 0 0 0 20px #ffffff80; }
    }
    .btn-group-deluxe {
      margin-top: 15px;
    }
  </style>
</body>
</html>
