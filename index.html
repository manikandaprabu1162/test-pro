<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Sathiya · elegant beginning</title>
  <!-- Bootstrap + icons + refined fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Elegant serif & sans-serif pairing -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #faf5f7;
      background-image: radial-gradient(circle at 70% 20%, #f9eef3 0%, #f5e6ed 100%);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* main card — subtle elegance */
    .elegant-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px 24px 48px 24px;
      box-shadow: 0 40px 60px -30px rgba(130, 70, 90, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.8) inset;
      max-width: 440px;
      width: 100%;
      padding: 32px 24px 36px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      text-align: center;
    }

    /* name — refined serif */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem;
      font-weight: 700;
      background: linear-gradient(145deg, #9e6b7e, #b8829a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    /* subtle divider */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #dbb6c9, transparent);
      margin: 8px auto 16px;
    }

    /* GIF container — elegant frame */
    .gif-frame {
      width: 200px;
      height: 200px;
      margin: 12px auto 18px;
      border-radius: 40% 20% 40% 20%;
      background: #f2dfe8;
      padding: 8px;
      box-shadow: 0 25px 35px -15px rgba(140, 80, 100, 0.3), 0 0 0 4px white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Replace the src with your GIF file */
    .gif-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 40% 20% 40% 20%;
      display: block;
    }

    /* fallback icon (elegant) — remove when you add your GIF */
    .gif-frame i {
      font-size: 5.5rem;
      color: #b3869b;
      opacity: 0.8;
    }

    .gif-caption {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 1.5px;
      color: #8b6f7c;
      text-transform: uppercase;
      margin-top: 4px;
      margin-bottom: 16px;
    }

    /* message — clean */
    .greeting {
      font-size: 1.2rem;
      font-weight: 300;
      color: #4f3843;
      background: rgba(255, 255, 255, 0.5);
      padding: 18px 16px;
      border-radius: 40px;
      margin: 8px 0 28px;
      border: 1px solid white;
      line-height: 1.6;
    }

    .greeting span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 500;
      color: #a55a7a;
      display: block;
      margin-bottom: 6px;
    }

    /* continue button — elegant */
    .continue-btn {
      background: #ac4e6e;
      border: none;
      padding: 14px 36px;
      font-size: 1.4rem;
      font-weight: 500;
      border-radius: 50px;
      box-shadow: 0 8px 18px -6px #ac4e6e80;
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.5);
      width: 100%;
      max-width: 220px;
      transition: 0.2s;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 1px;
      margin: 8px auto;
    }

    .continue-btn:hover {
      background: #bf6a86;
      transform: scale(1.02);
    }

    /* footer note — minimal */
    .footer-note {
      font-size: 0.9rem;
      color: #99748b;
      margin-top: 24px;
      background: rgba(255, 255, 255, 0.4);
      padding: 6px 16px;
      border-radius: 50px;
      display: inline-block;
      backdrop-filter: blur(4px);
    }

    /* one small decorative element */
    .tiny-heart {
      color: #dbb6c9;
      font-size: 1rem;
      margin: 0 4px;
    }

    /* no loops, no heavy animations — pure elegance */
  </style>
</head>
<body>
  <div class="elegant-card">
    <!-- name with grace -->
    <div class="name">Sathiya</div>
    <div class="divider"></div>

    <!-- ===== YOUR GIF GOES HERE ===== -->
    <!-- Replace the <i> tag with an <img> tag pointing to your GIF file -->
    <div class="gif-frame">
      <img src="images/shy.gif" alt="Sathiya and you">
    </div>
    <div class="gif-caption">a moment to cherish</div>

    <!-- main message — simple and warm -->
    <div class="greeting">
      <span>sathiya,</span>
      a little journey awaits
    </div>

    <!-- elegant continue button -->
    <button class="continue-btn" onclick="window.location.href='yesno.html'">
      continue <i class="bi bi-arrow-right ms-2 tiny-heart"></i>
    </button>

    <!-- subtle footer -->
    <div class="footer-note">
      <i class="bi bi-dot"></i> with warmth <i class="bi bi-dot"></i>
    </div>
  </div>

  <!-- no JavaScript loops — clean and simple -->
</body>
</html>
